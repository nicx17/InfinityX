substitutions:
  name: "esphome-web-673534"
  friendly_name: "Infinity"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.9.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Define GPIO outputs (active low)
switch:
  - platform: gpio
    pin:
      number: GPIO16
      mode: OUTPUT_OPEN_DRAIN
      inverted: true
    id: PWR
    name: "PWR"

  - platform: gpio
    pin:
      number: GPIO17
      mode: OUTPUT_OPEN_DRAIN
      inverted: true
    id: PP
    name: "PP"

  - platform: gpio
    pin:
      number: GPIO18
      mode: OUTPUT_OPEN_DRAIN
      inverted: true
    id: PLUS
    name: "VOLU"

  - platform: gpio
    pin:
      number: GPIO19
      mode: OUTPUT_OPEN_DRAIN
      inverted: true
    id: MINUS
    name: "VOLD"

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO34
      mode:
        input: true
        pullup: false
        pulldown: false
    name: "speaker_power_status"

# Expose short/long pulse buttons in HA
button:
  - platform: template
    name: "Mode"
    on_press:
      - switch.turn_on: PWR
      - delay: 200ms
      - switch.turn_off: PWR

  - platform: template
    name: "POWER"
    on_press:
      - switch.turn_on: PWR
      - delay: 2s
      - switch.turn_off: PWR

  - platform: template
    name: "PLAY"
    on_press:
      - switch.turn_on: PP
      - delay: 200ms
      - switch.turn_off: PP
      
  - platform: template
    name: "Pause"
    on_press:
      - switch.turn_on: PP
      - delay: 200ms
      - switch.turn_off: PP      

  - platform: template
    name: "VOL+"
    on_press:
      - switch.turn_on: PLUS
      - delay: 200ms
      - switch.turn_off: PLUS

  - platform: template
    name: "VOL-"
    on_press:
      - switch.turn_on: MINUS
      - delay: 200ms
      - switch.turn_off: MINUS