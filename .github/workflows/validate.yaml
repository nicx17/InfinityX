name: Pre-commit Validation

on:
  push:
    paths:
      - "**.yaml"
  pull_request:
    paths:
      - "**.yaml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ESPHome
        run: pip install esphome

      - name: Copy secrets template
        run: cp secrets.yaml.example secrets.yaml

      - name: Validate ESPHome Configuration
        run: esphome config esphome-web.yaml
